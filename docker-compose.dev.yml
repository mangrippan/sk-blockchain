# Docker Compose for Development
# Starts PostgreSQL database with auto schema initialization
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: prima_postgres_dev
    restart: unless-stopped

    environment:
      POSTGRES_DB: prima_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      # MD5 auth for better compatibility with Node.js pg library
      POSTGRES_HOST_AUTH_METHOD: md5
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

    ports:
      - "5434:5432"

    volumes:
      # Persistent data storage
      - pgdata_dev:/var/lib/postgresql/data

      # Auto-initialize schema & seed data on first run
      - ./database/schema-hybrid.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prima_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - prima_network

networks:
  prima_network:
    driver: bridge

volumes:
  pgdata_dev:
    name: prima_pgdata_dev
